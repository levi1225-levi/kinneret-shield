name: kinneret_shield
description: School NFC attendance system for TanenbaumCHAT
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Authentication & Backend
  google_sign_in: ^6.2.0
  supabase_flutter: ^2.3.0
  google_sign_in_web: ^0.12.0

  # HTTP & State Management
  dio: ^5.3.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  hooks_riverpod: ^2.4.0

  # Navigation
  go_router: ^12.0.0

  # Real-time
  web_socket_channel: ^2.4.0

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  uuid: ^4.0.0

  # UI & Charts
  fl_chart: ^0.64.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_animate: ^4.2.0

  # Notifications
  flutter_local_notifications: ^15.1.0

  # Model Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  freezed: ^2.4.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Light.ttf
          weight: 300
